services:
  - type: web
    name: abay-grand-hotel-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://abay-grand-hotel-nmn9.onrender.com
      - key: FRONTEND_URL
        value: https://abay-grand-hotel-w.vercel.app
      - key: ADMIN_URL
        value: https://abay-grand-hotel-admin.vercel.app
      - key: JWT_SECRET
        value: demo
      - key: CHAPA_SECRET_KEY
        value: CHASECK_TEST-ttCMGESjty3tmzBRPRUYk9gu5O8Xf8sm
      - key: CHAPA_PUBLIC_KEY
        value: CHAPUBK_TEST-DQFH3iHjMZeA5LFDP2OOcZNf7LrRYHVq
      - key: CHAPA_ENCRYPTION_KEY
        value: 0Or6a5iiGSwKM8TVGejDOBNp
      - key: CHAPA_WEBHOOK_SECRET
        value: CHASECK_TEST-ttCMGESjty3tmzBRPRUYk9gu5O8Xf8sm
      - key: CHAPA_API_URL
        value: https://api.chapa.co/v1
      # IMPORTANT: Set MONGODB_URI in Render Dashboard → Environment
      # (do not put database credentials in render.yaml)

  - type: static
    name: abay-grand-hotel-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    branch: main
    envVars:
      - key: VITE_API_URL
        value: https://abay-grand-hotel-nmn9.onrender.com
