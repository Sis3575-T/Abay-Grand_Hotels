<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Abay Grand Hotel">
  <title>Abay Grand Hotel</title>
  <rect width="64" height="64" rx="12" fill="#0F4C81" />
  <g transform="translate(6,6)">
      <defs>
        <style>
          .gold{fill:#D4AF37}
          .blue-stroke{stroke:#0F4C81;stroke-width:3.6;stroke-linecap:round;stroke-linejoin:round;fill:none}
          .blue-fill{fill:#0F4C81}
        </style>
      </defs>

      <!-- Transparent background; shapes only -->
      <rect width="64" height="64" fill="transparent" />

      <!-- Stylized A (gold) -->
      <path class="gold" d="M18 50 L32 12 L46 50 Z"/>
      <!-- Crossbar (blue) -->
      <rect x="26" y="34" width="12" height="4" rx="1.5" class="blue-fill"/>

      <!-- G element (blue stroke ring + notch) -->
      <circle cx="36" cy="34" r="12" class="blue-stroke"/>
      <path class="blue-stroke" d="M44 34 h-6"/>

      <!-- Subtle crown above the monogram (gold) -->
      <path class="gold" d="M24 12 L28 6 L32 12 L36 6 L40 12 L24 12 Z"/>
  </g>
</svg>
