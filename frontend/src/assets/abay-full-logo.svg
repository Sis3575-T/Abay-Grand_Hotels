<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100" role="img" aria-label="Abay Grand Hotel — Full Logo">
  <title>Abay Grand Hotel — Full Logo</title>
  <defs>
    <style>
      .gold{fill:#D4AF37}
      .deep{fill:#0F4C81}
      .logotype{font-family: 'Playfair Display', Georgia, serif; font-weight:700; fill:#0F4C81}
      .tagline{font-family: 'Inter', Arial, sans-serif; font-size:14px; fill:#6b7280}
    </style>
  </defs>

  <!-- Monogram on left -->
  <g transform="translate(10,10)">
    <rect width="80" height="80" rx="12" fill="transparent" />
    <path class="gold" d="M14 70 L32 16 L50 70 Z"/>
    <rect x="34" y="44" width="14" height="5" rx="1.5" class="deep"/>
    <circle cx="44" cy="44" r="14" class="deep" stroke="#0F4C81" stroke-width="3" fill="none"/>
    <path class="deep" d="M52 44 h-8" stroke="#0F4C81" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Text to the right -->
  <g transform="translate(110,30)">
    <text class="logotype" x="0" y="0" font-size="28">Abay</text>
    <text class="logotype" x="0" y="34" font-size="28">Grand Hotel</text>
    <text class="tagline" x="0" y="60">A Luxury Hospitality Experience</text>
  </g>
</svg>
