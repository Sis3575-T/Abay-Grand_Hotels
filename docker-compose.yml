services:
  mongodb:
    image: mongo:7
    container_name: abay-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-Abay_Grand_Hotel}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - abay-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abay-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/${MONGO_DATABASE:-Abay_Grand_Hotel}?authSource=admin
      FRONTEND_URL: http://localhost:80
      ADMIN_URL: http://localhost:81
      BACKEND_URL: http://localhost:4000
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - abay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: abay-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - abay-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: abay-admin
    restart: unless-stopped
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - abay-network

volumes:
  mongodb_data:
  backend_uploads:

networks:
  abay-network:
    driver: bridge
